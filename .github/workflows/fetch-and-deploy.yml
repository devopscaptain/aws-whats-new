name: Fetch & Deploy

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-data:
    name: Fetch RSS Data
    runs-on: ubuntu-latest
    outputs:
      data-changed: ${{ steps.commit.outputs.committed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch AWS What's New RSS
        run: node scripts/fetch-rss.js

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/whats-new.json
          if git diff --staged --quiet; then
            echo "No changes to data"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): sync AWS What's New $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: fetch-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull latest (may include the data commit above)
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
